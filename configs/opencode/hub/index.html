<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Hub</title>
  <meta name="description" content="Quick links to local dev services" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hub" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --online: #4ade80;
      --offline: #444;
      --accent: #6366f1;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    header {
      padding: 24px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:active { color: var(--text); border-color: var(--text-muted); }

    #hostname-badge {
      margin: 0 20px 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      display: inline-block;
    }

    #grid {
      padding: 0 12px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .section-label {
      padding: 0 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
    }

    .compose-badge {
      display: inline-block;
      font-size: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 1px 5px;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 500;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px 14px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      min-width: 0;
      overflow: hidden;
    }
    .card:active { background: var(--surface-hover); transform: scale(0.97); }
    .card.offline { opacity: 0.4; pointer-events: none; }

    .card-icon { font-size: 26px; line-height: 1; }
    .card-icon--svg { font-size: 0; line-height: 0; display: flex; align-items: center; height: 26px; }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-top: 2px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.3;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    .card-port {
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 6px;
    }

    .status-dot {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--online);
      box-shadow: 0 0 6px var(--online);
    }
    .card.offline .status-dot { background: var(--offline); box-shadow: none; }

    #empty {
      display: none;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    #spinner {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }
    .spin {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5; --surface: #fff; --surface-hover: #f0f0f0;
        --border: #e0e0e0; --text: #111; --text-muted: #666;
        --offline: #ccc;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏠 Hub</h1>
    <button id="refresh-btn" onclick="load()">↻ Refresh</button>
  </header>
  <div id="hostname-badge"></div>

  <div id="spinner"><div class="spin"></div></div>
  <div id="grid"></div>
  <div id="empty">No services found</div>

  <script>
    const host = window.location.hostname;
    document.getElementById('hostname-badge').textContent = host;

    // OpenCode logo SVG — color-scheme aware via currentColor
    const OPENCODE_SVG = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block">
      <rect x="1" y="5" width="6" height="14" rx="0" fill="currentColor" opacity="0.45"/>
      <rect x="3" y="3" width="6" height="18" rx="0" fill="currentColor" opacity="0.9"/>
    </svg>`;

    // Inline the actual opencode wordmark paths, colour-adapted
    // Real opencode logo paths, recoloured to currentColor (light parts) + currentColor at 35% (dark parts)
    const OPENCODE_ICON = `<svg viewBox="0 0 234 42" width="52" height="20" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;flex-shrink:0">
      <path d="M18 30H6V18H18V30Z" fill="currentColor" opacity="0.35"/>
      <path d="M18 12H6V30H18V12ZM24 36H0V6H24V36Z" fill="currentColor"/>
      <path d="M48 30H36V18H48V30Z" fill="currentColor" opacity="0.35"/>
      <path d="M36 30H48V12H36V30ZM54 36H36V42H30V6H54V36Z" fill="currentColor"/>
      <path d="M84 24V30H66V24H84Z" fill="currentColor" opacity="0.35"/>
      <path d="M84 24H66V30H84V36H60V6H84V24ZM66 18H78V12H66V18Z" fill="currentColor"/>
      <path d="M108 36H96V18H108V36Z" fill="currentColor" opacity="0.35"/>
      <path d="M108 12H96V36H90V6H108V12ZM114 36H108V12H114V36Z" fill="currentColor"/>
      <path d="M144 30H126V18H144V30Z" fill="currentColor" opacity="0.35"/>
      <path d="M144 12H126V30H144V36H120V6H144V12Z" fill="currentColor"/>
      <path d="M168 30H156V18H168V30Z" fill="currentColor" opacity="0.35"/>
      <path d="M168 12H156V30H168V12ZM174 36H150V6H174V36Z" fill="currentColor"/>
      <path d="M198 30H186V18H198V30Z" fill="currentColor" opacity="0.35"/>
      <path d="M198 12H186V30H198V12ZM204 36H180V6H198V0H204V36Z" fill="currentColor"/>
      <path d="M234 24V30H216V24H234Z" fill="currentColor" opacity="0.35"/>
      <path d="M216 12V18H228V12H216ZM234 24H216V30H234V36H210V6H234V24Z" fill="currentColor"/>
    </svg>`;

    function serviceUrl(port) {
      return `${window.location.protocol}//${host}:${port}`;
    }

    function iconHtml(svc) {
      if (svc.icon === '__opencode__') return `<div class="card-icon card-icon--svg" style="color:var(--text)">${OPENCODE_ICON}</div>`;
      return `<div class="card-icon">${svc.icon}</div>`;
    }

    function renderCard(svc) {
      const a = document.createElement('a');
      a.className = 'card' + (svc.online ? '' : ' offline');
      a.href = serviceUrl(svc.port);
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <div class="status-dot"></div>
        ${iconHtml(svc)}
        <div class="card-name">${svc.name}</div>
        <div class="card-desc">${svc.description}</div>
        <div class="card-port">:${svc.port}</div>
      `;
      return a;
    }

    function renderGroup(grid, label, labelIcon, badge, services) {
      if (!services.length) return;
      const section = document.createElement('div');
      section.className = 'section';

      const header = document.createElement('div');
      header.className = 'section-label';
      if (labelIcon) {
        const icon = document.createElement('span');
        icon.textContent = labelIcon;
        header.appendChild(icon);
      }
      const text = document.createElement('span');
      text.textContent = label;
      header.appendChild(text);
      if (badge) {
        const span = document.createElement('span');
        span.className = 'compose-badge';
        span.textContent = badge;
        header.appendChild(span);
      }
      section.appendChild(header);

      const cards = document.createElement('div');
      cards.className = 'section-cards';
      services.forEach(s => cards.appendChild(renderCard(s)));
      section.appendChild(cards);

      grid.appendChild(section);
    }

    async function load() {
      const grid = document.getElementById('grid');
      const spinner = document.getElementById('spinner');
      const empty = document.getElementById('empty');
      grid.innerHTML = '';
      spinner.style.display = 'flex';
      empty.style.display = 'none';

      try {
        const res = await fetch('/api/services');
        const services = await res.json();

        spinner.style.display = 'none';

        if (services.length === 0) {
          empty.style.display = 'block';
          return;
        }

        // Split evergreen (static, no group) from portal instances from Docker
        const evergreen = services.filter(s => s.static && !s.group);
        const portal = services.filter(s => s.static && s.group);
        const docker = services.filter(s => !s.static);

        // Group portal instances by project name (svc.group)
        const portalByProject = new Map();
        for (const svc of portal) {
          if (!portalByProject.has(svc.group)) portalByProject.set(svc.group, []);
          portalByProject.get(svc.group).push(svc);
        }

        // Group Docker by composeProject; ungrouped (no project) go last
        const byProject = new Map();
        const standalone = [];
        for (const svc of docker) {
          if (svc.composeProject) {
            if (!byProject.has(svc.composeProject)) byProject.set(svc.composeProject, []);
            byProject.get(svc.composeProject).push(svc);
          } else {
            standalone.push(svc);
          }
        }

        renderGroup(grid, 'Evergreen', null, null, evergreen);

        for (const [project, svcs] of portalByProject) {
          svcs.sort((a, b) => b.online - a.online);
          renderGroup(grid, project, '📁', null, svcs);
        }

        for (const [project, svcs] of byProject) {
          svcs.sort((a, b) => b.online - a.online);
          renderGroup(grid, project, '🐳', null, svcs);
        }

        if (standalone.length) {
          standalone.sort((a, b) => b.online - a.online);
          renderGroup(grid, 'Docker', '🐳', null, standalone);
        }

      } catch (e) {
        spinner.style.display = 'none';
        empty.textContent = 'Failed to load services';
        empty.style.display = 'block';
      }
    }

    load();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
