<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dev Home</title>
  <meta name="description" content="Quick links to local dev services" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Dev Home" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface-hover: #242424;
      --border: #2a2a2a;
      --text: #f0f0f0;
      --text-muted: #888;
      --online: #4ade80;
      --offline: #444;
      --accent: #6366f1;
      --radius: 14px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100dvh;
      padding: env(safe-area-inset-top, 0) env(safe-area-inset-right, 0)
               env(safe-area-inset-bottom, 0) env(safe-area-inset-left, 0);
    }

    header {
      padding: 24px 20px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    #refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    #refresh-btn:active { color: var(--text); border-color: var(--text-muted); }

    #hostname-badge {
      margin: 0 20px 16px;
      font-size: 12px;
      color: var(--text-muted);
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 8px;
      display: inline-block;
    }

    .section-label {
      padding: 20px 20px 8px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      grid-column: 1 / -1;
    }

    .section-label:first-child { padding-top: 8px; }

    .compose-badge {
      display: inline-block;
      font-size: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
      background: var(--border);
      color: var(--text-muted);
      border-radius: 4px;
      padding: 1px 5px;
      margin-left: 6px;
      vertical-align: middle;
      letter-spacing: 0;
      text-transform: none;
      font-weight: 500;
    }

    #grid {
      padding: 0 12px 32px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 14px 14px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: background 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .card:active { background: var(--surface-hover); transform: scale(0.97); }
    .card.offline { opacity: 0.4; pointer-events: none; }

    .card-icon { font-size: 26px; line-height: 1; }

    .card-name {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
      margin-top: 2px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .card-port {
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: var(--text-muted);
      margin-top: auto;
      padding-top: 6px;
    }

    .status-dot {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--online);
      box-shadow: 0 0 6px var(--online);
    }
    .card.offline .status-dot { background: var(--offline); box-shadow: none; }

    #empty {
      display: none;
      padding: 60px 20px;
      text-align: center;
      color: var(--text-muted);
      font-size: 15px;
    }

    #spinner {
      display: flex;
      justify-content: center;
      padding: 60px 0;
    }
    .spin {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f5f5f5; --surface: #fff; --surface-hover: #f0f0f0;
        --border: #e0e0e0; --text: #111; --text-muted: #666;
        --offline: #ccc;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>🏠 Dev Home</h1>
    <button id="refresh-btn" onclick="load()">↻ Refresh</button>
  </header>
  <div id="hostname-badge"></div>

  <div id="spinner"><div class="spin"></div></div>
  <div id="grid"></div>
  <div id="empty">No services found</div>

  <script>
    const host = window.location.hostname;
    document.getElementById('hostname-badge').textContent = host;

    function serviceUrl(port) {
      return `${window.location.protocol}//${host}:${port}`;
    }

    function renderCard(svc) {
      const a = document.createElement('a');
      a.className = 'card' + (svc.online ? '' : ' offline');
      a.href = serviceUrl(svc.port);
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <div class="status-dot"></div>
        <div class="card-icon">${svc.icon}</div>
        <div class="card-name">${svc.name}</div>
        <div class="card-desc">${svc.description}</div>
        <div class="card-port">:${svc.port}</div>
      `;
      return a;
    }

    function renderLabel(text, badge) {
      const div = document.createElement('div');
      div.className = 'section-label';
      div.textContent = text;
      if (badge) {
        const span = document.createElement('span');
        span.className = 'compose-badge';
        span.textContent = badge;
        div.appendChild(span);
      }
      return div;
    }

    function renderGroup(grid, label, badge, services) {
      if (!services.length) return;
      grid.appendChild(renderLabel(label, badge));
      services.forEach(s => grid.appendChild(renderCard(s)));
    }

    async function load() {
      const grid = document.getElementById('grid');
      const spinner = document.getElementById('spinner');
      const empty = document.getElementById('empty');
      grid.innerHTML = '';
      spinner.style.display = 'flex';
      empty.style.display = 'none';

      try {
        const res = await fetch('/api/services');
        const services = await res.json();

        spinner.style.display = 'none';

        if (services.length === 0) {
          empty.style.display = 'block';
          return;
        }

        // Split evergreen (static, no group) from portal instances from Docker
        const evergreen = services.filter(s => s.static && !s.group);
        const portal = services.filter(s => s.static && s.group);
        const docker = services.filter(s => !s.static);

        // Group portal instances by project name (svc.name)
        const portalByProject = new Map();
        for (const svc of portal) {
          if (!portalByProject.has(svc.name)) portalByProject.set(svc.name, []);
          portalByProject.get(svc.name).push(svc);
        }

        // Group Docker by composeProject; ungrouped (no project) go last
        const byProject = new Map();
        const standalone = [];
        for (const svc of docker) {
          if (svc.composeProject) {
            if (!byProject.has(svc.composeProject)) byProject.set(svc.composeProject, []);
            byProject.get(svc.composeProject).push(svc);
          } else {
            standalone.push(svc);
          }
        }

        renderGroup(grid, 'Evergreen', null, evergreen);

        for (const [project, svcs] of portalByProject) {
          svcs.sort((a, b) => b.online - a.online);
          renderGroup(grid, project, null, svcs);
        }

        for (const [project, svcs] of byProject) {
          svcs.sort((a, b) => b.online - a.online);
          renderGroup(grid, 'Docker', project, svcs);
        }

        if (standalone.length) {
          standalone.sort((a, b) => b.online - a.online);
          renderGroup(grid, 'Docker', null, standalone);
        }

      } catch (e) {
        spinner.style.display = 'none';
        empty.textContent = 'Failed to load services';
        empty.style.display = 'block';
      }
    }

    load();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
